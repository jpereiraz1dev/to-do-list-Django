{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="todo-container">

    <h1>Editar tarefa</h1>

    <form method="POST">
        {% csrf_token %}

        {% for field in form.visible_fields %}
            <div>
            {{ field.label_tag }}
            {{ field}}
            {{ field.errors }}
            </div>
        {% endfor %}

        <input type="submit" value="Salvar alterações">

    </form>

</div>

{% endblock %}
