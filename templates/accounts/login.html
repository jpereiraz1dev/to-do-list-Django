{% extends 'base.html' %}
{% load static %}
{% block content %}

<div>
        <h1>Fazer login</h1>

        <form method="POST">
            {% csrf_token %}

            {% for field in form.visible_fields %}
            <div>
                {{field.label_tag}}
                {{field}}
                {{form.errors}}
            </div>
            {% endfor %}
            <input type="submit" value="Logar">
            </form>
            <form action="{%url 'cadastro'%}" >
                <input style="color: black; background-color: lightgreen;" type="submit" value="Ainda nao tem uma conta? Clique aqui para se Cadastrar" >
            </form>

    </div>
{% endblock %}
